<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Highway: Arcade Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden; user-select: none;
            font-family: 'Orbitron', sans-serif; color: white;
            display: flex; justify-content: center; align-items: center;
        }

        /* PERFECT SCALING CONTAINER - Maintains 16:9 aspect ratio on any screen */
        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 aspect ratio */
            max-height: 100vh;
            max-width: 177.78vh; /* 16:9 aspect ratio */
            background: #080812;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* The canvas is locked at 1280x720 internally, the browser scales it here */
        }

        /* Menus overlaying the wrapper */
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.9); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; z-index: 20; transition: opacity 0.3s;
        }

        #game-over, #pause-screen { display: none; opacity: 0; }

        h1 { margin: 0 0 15px 0; font-size: 5vw; font-weight: 900; color: #fff; letter-spacing: 4px; text-shadow: 0 0 20px #0ff; text-transform: uppercase;}
        
        .stats { background: rgba(0,0,0,0.6); padding: 2vh 3vw; border-radius: 15px; border: 1px solid rgba(0,255,255,0.3); margin-bottom: 20px; }
        p { margin: 8px 0; font-size: 1.5vw; color: #ddd; }
        
        .highlight-gold { color: #ff0; font-weight: bold; }
        .highlight-blue { color: #0bf; font-weight: bold; }

        .btn-row { display: flex; gap: 15px; margin-top: 15px; justify-content: center; align-items: center; }
        
        button.action-btn {
            padding: 1.5vh 2vw; font-size: 1.5vw; font-family: inherit; font-weight: 700;
            background: rgba(0, 255, 255, 0.1); color: #0ff; border: 2px solid #0ff;
            border-radius: 8px; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s ease;
        }
        button.action-btn:hover { background-color: #0ff; color: #000; transform: scale(1.05); }

        .controls-hint { font-size: 1.2vw; color: #aaa; margin-top: 20px; background: rgba(0,0,0,0.6); padding: 1vh 2vw; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        #creator-credit {
            position: absolute; bottom: 2%; right: 2%; z-index: 25;
            background: rgba(0,0,0,0.8); border-left: 4px solid #0ff;
            padding: 1vh 1vw; border-radius: 6px; font-size: 1.2vw; letter-spacing: 1px;
            pointer-events: auto;
        }
        #creator-credit a { color: #f0f; text-decoration: none; font-weight: bold; transition: 0.3s;}
        #creator-credit a:hover { color: #fff; }

        @media (min-width: 1200px) {
            h1 { font-size: 60px; }
            p { font-size: 18px; }
            button.action-btn { font-size: 18px; padding: 15px 30px; }
            .controls-hint { font-size: 14px; }
            #creator-credit { font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    
    <div id="creator-credit">
        Dev: <a href="http://www.waliulawaltaha.com" target="_blank">Waliul Awal Taha</a>
    </div>

    <div id="start-screen" class="screen-overlay">
        <h1>NEON HIGHWAY</h1>
        <div class="stats">
            <p>Dodge traffic on the endless digital highway.</p>
            <p>Collect <span class="highlight-gold">Gold Cubes</span> to boost your score.</p>
            <p>Grab <span class="highlight-blue">Shields</span> to survive a crash.</p>
        </div>
        <button class="action-btn" onclick="initGame()">START ENGINE [ENTER]</button>
        <div class="controls-hint">
            <strong>W / UP:</strong> Accelerate &nbsp;&bull;&nbsp; <strong>S / DOWN:</strong> Brake <br>
            <strong>A / D:</strong> Steer Left/Right
        </div>
    </div>

    <div id="pause-screen" class="screen-overlay">
        <h1 style="color: #f0f; text-shadow: 0 0 20px #f0f;">PAUSED</h1>
        <button class="action-btn" onclick="togglePause()">RESUME [ESC]</button>
    </div>

    <div id="game-over" class="screen-overlay">
        <h1 style="color: #f00; text-shadow: 0 0 20px #f00;">SYSTEM FAILURE</h1>
        <p style="margin-top:10px; font-size: 20px; color: #aaa; letter-spacing: 2px;">FINAL SCORE</p>
        <p><span id="final-score" style="color:#0ff; font-weight:900; font-size: 80px; text-shadow: 0 0 20px #0ff; margin: 0;">0</span></p>
        
        <div class="btn-row" style="margin-top: 30px;">
            <button class="action-btn" onclick="shareScore()">SHARE SCORE</button>
            <button class="action-btn" onclick="initGame()">REBOOT [ENTER]</button>
        </div>
    </div>
</div>

<script>
    // --- CANVAS CONFIGURATION ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // alpha: false drastically improves FPS
    
    // Internal fixed resolution for flawless scaling and 60FPS
    const W = 1280;
    const H = 720;

    // UI Elements
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over');
    const pauseScreen = document.getElementById('pause-screen');
    const finalScoreElement = document.getElementById('final-score');

    function shareScore() {
        let url = window.location.href; if (url.includes('file://')) url = 'http://www.waliulawaltaha.com'; 
        const text = `I just survived the Neon Highway and scored ${Math.floor(score)}! 🏎️✨ Can you beat my high score?`;
        if (navigator.share) { navigator.share({ title: 'Neon Highway', text: text, url: url }).catch(err => {}); }
        else { navigator.clipboard.writeText(`${text} Play here: ${url}`).then(() => alert("Copied to clipboard!")); }
    }

    // --- 3D PROJECTION MATH ---
    const CAMERA_Y = 300;     // Height of camera
    const FOCAL_LENGTH = 800; // FOV
    const HORIZON_Y = 250;    // Vanishing point Y
    const RENDER_DIST = 6000;

    function project3D(wX, wY, wZ, camX, camZ) {
        let dz = wZ - camZ;
        if (dz <= 10) return null; // Behind camera
        let scale = FOCAL_LENGTH / dz;
        let px = (W / 2) + ((wX - camX) * scale);
        let py = HORIZON_Y + ((CAMERA_Y - wY) * scale);
        return { x: px, y: py, scale: scale, depth: dz };
    }

    // --- GAME VARIABLES ---
    let animationId; let lastTime = 0;
    let score = 0; let highScore = localStorage.getItem('neonHighRes') || 0;
    
    let cameraZ = 0; let cameraX = 0;
    let baseSpeed = 2500; let currentSpeed = 0; let targetSpeed = baseSpeed;
    
    let isGameOver = false; let isGameRunning = false; let isPaused = false;
    let keys = { left: false, right: false, up: false, down: false };

    // The Player Car
    let player = { 
        x: 0, zOffset: 400, // Distance from camera
        vx: 0, maxVx: 100, accel: 8, friction: 0.85, 
        shield: false, width: 220, height: 100 
    };

    let entities = []; // Enemies and collectibles

    const ENEMY_COLORS = ['#f0f', '#f80', '#f00', '#fff'];

    // --- CONTROLS ---
    window.addEventListener('keydown', (e) => { 
        let k = e.key.toLowerCase();
        if(k === 'arrowleft' || k === 'a') keys.left = true;
        if(k === 'arrowright' || k === 'd') keys.right = true;
        if(k === 'arrowup' || k === 'w') keys.up = true;
        if(k === 'arrowdown' || k === 's') keys.down = true;
        if((k === 'escape' || k === 'p') && isGameRunning && !isGameOver) togglePause();
        if(k === 'enter' && (!isGameRunning || isGameOver)) initGame();
    });
    window.addEventListener('keyup', (e) => { 
        let k = e.key.toLowerCase();
        if(k === 'arrowleft' || k === 'a') keys.left = false;
        if(k === 'arrowright' || k === 'd') keys.right = false;
        if(k === 'arrowup' || k === 'w') keys.up = false;
        if(k === 'arrowdown' || k === 's') keys.down = false;
    });

    // Touch Controls mapping for Left/Right halves of screen
    window.addEventListener('pointerdown', (e) => {
        if(!isGameRunning || isPaused) return;
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        if (x < rect.width / 2) { keys.left = true; keys.right = false; }
        else { keys.right = true; keys.left = false; }
    });
    window.addEventListener('pointerup', () => { keys.left = false; keys.right = false; });

    // --- CORE LOGIC ---
    function togglePause() {
        if (!isGameRunning || isGameOver) return;
        isPaused = !isPaused;
        if (isPaused) { pauseScreen.style.display = 'flex'; pauseScreen.style.opacity = '1'; cancelAnimationFrame(animationId); } 
        else { pauseScreen.style.opacity = '0'; setTimeout(() => { pauseScreen.style.display = 'none'; }, 300); lastTime = performance.now(); animationId = requestAnimationFrame(gameLoop); }
    }

    function initGame() {
        score = 0; cameraZ = 0; cameraX = 0;
        currentSpeed = baseSpeed; targetSpeed = baseSpeed;
        isGameOver = false; isGameRunning = true; isPaused = false;
        
        player.x = 0; player.vx = 0; player.shield = false;
        entities = [];
        
        keys.left = keys.right = keys.up = keys.down = false;
        
        startScreen.style.display = 'none'; gameOverScreen.style.display = 'none'; gameOverScreen.style.opacity = '0';
        
        lastTime = performance.now(); cancelAnimationFrame(animationId); animationId = requestAnimationFrame(gameLoop);
    }

    function spawnEntity(zPos) {
        // Highway has 3 distinct lanes: -1000, 0, 1000
        let lanes = [-1200, 0, 1200];
        let lane = lanes[Math.floor(Math.random() * lanes.length)];
        
        if (Math.random() > 0.2) {
            // Spawn Enemy
            let speed = currentSpeed * (Math.random() * 0.4 + 0.4); // Enemies move slower than player
            let color = ENEMY_COLORS[Math.floor(Math.random() * ENEMY_COLORS.length)];
            entities.push({ type: 'enemy', x: lane, z: zPos, w: 220, h: 100, speed: speed, color: color });
        } else {
            // Spawn Collectible
            let type = Math.random() > 0.85 ? 'shield' : 'gold';
            entities.push({ type: type, x: lane, z: zPos, w: 100, h: 100 });
        }
    }

    function update(dt) {
        if (isGameOver) return;
        let timeScale = dt / 16.6; // Normalize to 60FPS

        // --- PLAYER MOVEMENT ---
        if (keys.left) player.vx -= player.accel * timeScale;
        if (keys.right) player.vx += player.accel * timeScale;
        player.vx *= Math.pow(player.friction, timeScale);
        player.x += player.vx * timeScale;
        
        // Road Bounds (-2000 to 2000 is asphalt)
        if (player.x < -1800) { player.x = -1800; player.vx = 0; } 
        if (player.x > 1800) { player.x = 1800; player.vx = 0; }

        // Acceleration & Braking
        if (keys.up) targetSpeed = baseSpeed * 1.5;
        else if (keys.down) targetSpeed = baseSpeed * 0.5;
        else targetSpeed = baseSpeed;
        
        currentSpeed += (targetSpeed - currentSpeed) * 0.05 * timeScale;
        
        // Camera moves forward
        cameraZ += currentSpeed * (dt/1000); 
        let playerZ = cameraZ + player.zOffset;

        // Score
        score += (currentSpeed / 3000) * timeScale;

        // --- ENTITY LOGIC ---
        // Cleanup behind camera
        while (entities.length > 0 && entities[0].z < cameraZ) {
            entities.shift();
        }

        // Spawn ahead
        let furthestZ = entities.length > 0 ? entities[entities.length-1].z : cameraZ;
        if (furthestZ < cameraZ + RENDER_DIST) {
            // Spawn intervals get tighter as score goes up
            let gap = Math.max(800, 2000 - (score * 2));
            spawnEntity(furthestZ + gap);
        }

        // Update & Collide
        for (let i = 0; i < entities.length; i++) {
            let e = entities[i];
            
            if (e.type === 'enemy') {
                e.z += e.speed * (dt/1000);
            }

            // Simple 3D AABB Collision
            let hitX = Math.abs(player.x - e.x) < (player.width + e.w) / 2;
            let hitZ = Math.abs(playerZ - e.z) < 200; // Depth threshold

            if (hitX && hitZ) {
                if (e.type === 'enemy') {
                    if (player.shield) {
                        player.shield = false;
                        entities.splice(i, 1); i--;
                    } else {
                        isGameOver = true;
                        if (score > highScore) { highScore = score; localStorage.setItem('neonHighRes', highScore); }
                        finalScoreElement.innerText = Math.floor(score);
                        gameOverScreen.style.display = 'flex'; setTimeout(() => { gameOverScreen.style.opacity = '1'; }, 50);
                    }
                } else if (e.type === 'gold') {
                    score += 50;
                    entities.splice(i, 1); i--;
                } else if (e.type === 'shield') {
                    player.shield = true;
                    entities.splice(i, 1); i--;
                }
            }
        }
    }

    // --- RENDERING ---
    function drawCar(p, drawW, drawH, color, isPlayer=false, vx=0) {
        ctx.save();
        ctx.translate(p.x, p.y);
        
        // Tilt for steering
        ctx.rotate((vx / player.maxVx) * 0.2);

        // Tires
        ctx.fillStyle = '#000';
        ctx.fillRect(-drawW*0.45, -drawH*0.2, drawW*0.2, drawH*0.3); // Left
        ctx.fillRect(drawW*0.25, -drawH*0.2, drawW*0.2, drawH*0.3);  // Right

        // Chassis Base
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(-drawW*0.4, 0); ctx.lineTo(drawW*0.4, 0);
        ctx.lineTo(drawW*0.5, -drawH*0.5); ctx.lineTo(-drawW*0.5, -drawH*0.5); ctx.fill();

        // Chassis Top (Color)
        let grad = ctx.createLinearGradient(0, -drawH, 0, 0);
        grad.addColorStop(0, color); grad.addColorStop(1, '#333');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(-drawW*0.3, -drawH); ctx.lineTo(drawW*0.3, -drawH);
        ctx.lineTo(drawW*0.5, -drawH*0.5); ctx.lineTo(-drawW*0.5, -drawH*0.5); ctx.fill();

        // Windshield
        ctx.fillStyle = '#050510';
        ctx.beginPath();
        ctx.moveTo(-drawW*0.25, -drawH*0.9); ctx.lineTo(drawW*0.25, -drawH*0.9);
        ctx.lineTo(drawW*0.35, -drawH*0.5); ctx.lineTo(-drawW*0.35, -drawH*0.5); ctx.fill();

        // Taillights
        ctx.fillStyle = isPlayer ? '#fff' : '#f00';
        ctx.fillRect(-drawW*0.4, -drawH*0.4, drawW*0.2, drawH*0.15);
        ctx.fillRect(drawW*0.2, -drawH*0.4, drawW*0.2, drawH*0.15);

        // Exhaust
        ctx.fillStyle = '#0ff';
        if (isPlayer && targetSpeed > baseSpeed) {
            // Exhaust flame when accelerating
            ctx.fillStyle = '#0f0';
            ctx.fillRect(-drawW*0.2, 0, drawW*0.1, drawH*0.2);
            ctx.fillRect(drawW*0.1, 0, drawW*0.1, drawH*0.2);
        }

        // Shield Bubble
        if (isPlayer && player.shield) {
            ctx.strokeStyle = '#0bf'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, -drawH/2, drawW*0.8, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = 'rgba(0, 187, 255, 0.2)'; ctx.fill();
        }

        ctx.restore();
    }

    function draw() {
        // Camera Follows Player smoothly
        cameraX += (player.x * 0.6 - cameraX) * 0.1;
        
        // 1. Clear & Sky
        ctx.fillStyle = '#030308'; ctx.fillRect(0, 0, W, H);
        
        let panX = -cameraX * 0.1; // Parallax
        let sunGrad = ctx.createLinearGradient(0, HORIZON_Y - 200, 0, HORIZON_Y); 
        sunGrad.addColorStop(0, '#f0f'); sunGrad.addColorStop(1, '#ff0');
        ctx.fillStyle = sunGrad; 
        ctx.beginPath(); ctx.arc(W/2 + panX, HORIZON_Y, 150, Math.PI, 0); ctx.fill(); 
        
        // Sun Cutouts
        ctx.fillStyle = '#030308'; 
        for(let i=0; i<8; i++) { ctx.fillRect(0, HORIZON_Y - 20 - (i*15), W, i+3); }

        // 2. Draw 3D Highway
        let segLen = 300; let startZ = Math.floor(cameraZ / segLen) * segLen;
        
        // Draw back-to-front
        for (let i = 20; i > 0; i--) {
            let z1 = startZ + (i * segLen); let z2 = startZ + ((i - 1) * segLen);
            let p1 = project3D(0, 0, z1, cameraX, cameraZ); 
            let p2 = project3D(0, 0, z2, cameraX, cameraZ);
            if (!p1 || !p2) continue;

            let w1 = 3000 * p1.scale; let w2 = 3000 * p2.scale; // Total Road Width
            let isDark = ((z1 / segLen) % 2 === 0);

            // Ground/Grass Off-road
            ctx.fillStyle = isDark ? '#05050a' : '#080812';
            ctx.fillRect(0, p1.y, W, (p2.y - p1.y) + 1); 

            // Asphalt
            ctx.fillStyle = '#12121a';
            ctx.beginPath(); ctx.moveTo(p1.x - w1, p1.y); ctx.lineTo(p1.x + w1, p1.y);
            ctx.lineTo(p2.x + w2, p2.y); ctx.lineTo(p2.x - w2, p2.y); ctx.fill();

            // Shoulders (Rumble Strips)
            let r1 = 300 * p1.scale; let r2 = 300 * p2.scale;
            ctx.fillStyle = isDark ? '#b00' : '#ddd';
            // Left Rumble
            ctx.beginPath(); ctx.moveTo(p1.x - w1, p1.y); ctx.lineTo(p1.x - w1 - r1, p1.y); 
            ctx.lineTo(p2.x - w2 - r2, p2.y); ctx.lineTo(p2.x - w2, p2.y); ctx.fill();
            // Right Rumble
            ctx.beginPath(); ctx.moveTo(p1.x + w1, p1.y); ctx.lineTo(p1.x + w1 + r1, p1.y); 
            ctx.lineTo(p2.x + w2 + r2, p2.y); ctx.lineTo(p2.x + w2, p2.y); ctx.fill();

            // Lane Dividers (Dashed lines)
            if (isDark) {
                ctx.fillStyle = '#fff';
                let laneWidth = w1 / 1.5; // Divide road into lanes
                let laneWidth2 = w2 / 1.5;
                let lineW1 = 30 * p1.scale; let lineW2 = 30 * p2.scale;
                
                // Left Line
                ctx.beginPath(); ctx.moveTo(p1.x - laneWidth, p1.y); ctx.lineTo(p1.x - laneWidth + lineW1, p1.y);
                ctx.lineTo(p2.x - laneWidth2 + lineW2, p2.y); ctx.lineTo(p2.x - laneWidth2, p2.y); ctx.fill();
                
                // Right Line
                ctx.beginPath(); ctx.moveTo(p1.x + laneWidth, p1.y); ctx.lineTo(p1.x + laneWidth - lineW1, p1.y);
                ctx.lineTo(p2.x + laneWidth2 - lineW2, p2.y); ctx.lineTo(p2.x + laneWidth2, p2.y); ctx.fill();
            }
        }

        // 3. Draw Entities & Player
        let renderList = [...entities];
        if (!isGameOver && isGameRunning) {
            renderList.push({ type: 'player', x: player.x, y: 0, z: cameraZ + player.zOffset, w: player.width, h: player.height, color: player.color, vx: player.vx });
        }
        
        // Z-Sort
        renderList.sort((a, b) => b.z - a.z);

        for (let e of renderList) {
            let p = project3D(e.x, 0, e.z, cameraX, cameraZ);
            if (!p) continue;
            
            let drawW = e.w * p.scale;
            let drawH = e.h * p.scale;

            if (e.type === 'enemy' || e.type === 'player') {
                drawCar(p, drawW, drawH, e.color, e.type==='player', e.vx || 0);
            } else if (e.type === 'gold' || e.type === 'shield') {
                // Bobbing animation for collectibles
                let floatY = p.y - (Math.sin(Date.now()/200) * 20 * p.scale) - drawW;
                
                ctx.save(); ctx.translate(p.x, floatY);
                if (e.type === 'gold') {
                    ctx.rotate(Date.now() / 500); 
                    ctx.fillStyle = '#ff0'; ctx.fillRect(-drawW/2, -drawW/2, drawW, drawW);
                    ctx.fillStyle = '#fff'; ctx.fillRect(-drawW/4, -drawW/4, drawW/2, drawW/2);
                } else {
                    ctx.fillStyle = 'rgba(0, 187, 255, 0.8)';
                    ctx.beginPath(); ctx.arc(0, 0, drawW/2, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.restore();
            }
        }

        // 4. Draw Canvas HUD (Scales perfectly and never misaligns)
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, 60);

        ctx.font = 'bold 24px Orbitron';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#0ff';
        ctx.fillText(`SCORE: ${Math.floor(score)}`, 20, 40);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#f0f';
        ctx.fillText(`SPEED: ${Math.floor(currentSpeed/10)} KPH`, W/2, 40);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff0';
        ctx.fillText(`HIGH: ${Math.floor(highScore)}`, W - 20, 40);
        
        if (player.shield) {
            ctx.fillStyle = '#0bf';
            ctx.fillText(`SHIELD ONLINE`, W - 20, 90);
        }
    }

    function gameLoop(timestamp) {
        if (isPaused) return; 
        if (!isGameRunning) { draw(); return; } 
        let dt = timestamp - lastTime; lastTime = timestamp; if (dt > 100) dt = 16.6; 
        update(dt); draw(); animationId = requestAnimationFrame(gameLoop);
    }

    // Run first frame
    requestAnimationFrame((t) => { lastTime = t; draw(); });
</script>
</body>
</html>
